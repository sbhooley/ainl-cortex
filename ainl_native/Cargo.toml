[package]
name = "ainl_native"
version = "0.1.0"
edition = "2021"

[lib]
name = "ainl_native"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.24", features = ["extension-module", "abi3-py310"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Core graph memory
ainl-memory = { path = "../../../../.armaraos/src/armaraos/crates/ainl-memory" }
ainl-contracts = { path = "../../../../.armaraos/src/armaraos/crates/ainl-contracts" }

# Persona evolution
ainl-persona = { path = "../../../../.armaraos/src/armaraos/crates/ainl-persona" }

# Semantic tagging (enable serde for SemanticTag serialization)
ainl-semantic-tagger = { path = "../../../../.armaraos/src/armaraos/crates/ainl-semantic-tagger", features = ["serde"] }

# Failure learning
ainl-failure-learning = { path = "../../../../.armaraos/src/armaraos/crates/ainl-failure-learning" }

# Procedure learning
ainl-procedure-learning = { path = "../../../../.armaraos/src/armaraos/crates/ainl-procedure-learning" }

# Context freshness
ainl-context-freshness = { path = "../../../../.armaraos/src/armaraos/crates/ainl-context-freshness" }

# Trajectory
ainl-trajectory = { path = "../../../../.armaraos/src/armaraos/crates/ainl-trajectory" }

[patch.crates-io]
ainl-graph-extractor = { path = "../../../../.armaraos/src/armaraos/crates/ainl-graph-extractor" }
ainl-memory = { path = "../../../../.armaraos/src/armaraos/crates/ainl-memory" }
ainl-persona = { path = "../../../../.armaraos/src/armaraos/crates/ainl-persona" }
ainl-semantic-tagger = { path = "../../../../.armaraos/src/armaraos/crates/ainl-semantic-tagger" }
ainl-runtime = { path = "../../../../.armaraos/src/armaraos/crates/ainl-runtime" }
ainl-agent-snapshot = { path = "../../../../.armaraos/src/armaraos/crates/ainl-agent-snapshot" }
